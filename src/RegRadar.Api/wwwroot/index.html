<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RegRadar — регуляторная повестка</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <img class="icon" src="assets/icons/logo-mark.svg" width="28" height="28" alt="">
      <span class="brand-name">RegRadar</span>
    </div>
    <hr class="sidebar-divider">
    <ul class="nav-list" id="nav-list">
      <li><a class="nav-item" data-route="overview" href="#/overview">
        <img class="icon" src="assets/icons/nav-overview.svg" width="18" height="18" alt="">Обзор</a></li>
      <li><a class="nav-item" data-route="changes" href="#/changes">
        <img class="icon" src="assets/icons/nav-changes.svg" width="18" height="18" alt="">Изменения</a></li>
      <li><a class="nav-item" data-route="chat" href="#/chat">
        <img class="icon" src="assets/icons/nav-chat.svg" width="18" height="18" alt="">RAG-чат</a></li>
      <li><a class="nav-item" data-route="clients" href="#/clients">
        <img class="icon" src="assets/icons/nav-clients.svg" width="18" height="18" alt="">Клиенты</a></li>
      <li><a class="nav-item" data-route="notifications" href="#/notifications">
        <img class="icon" src="assets/icons/nav-notifications.svg" width="18" height="18" alt="">Уведомления</a></li>
      <li><a class="nav-item" data-route="sources" href="#/sources">
        <img class="icon" src="assets/icons/nav-sources.svg" width="18" height="18" alt="">Источники</a></li>
      <li><a class="nav-item" data-route="settings" href="#/settings">
        <img class="icon" src="assets/icons/nav-settings.svg" width="18" height="18" alt="">Настройки</a></li>
    </ul>
    <div class="sidebar-spacer"></div>
    <div class="account-card">
      <div class="avatar"></div>
      <div>
        <div class="account-name">Елена Орлова</div>
        <div class="account-role">Комплаенс-юрист</div>
      </div>
    </div>
  </aside>

  <div class="content">
    <div class="topbar" id="topbar"></div>
    <div id="page"></div>
  </div>
</div>

<input type="file" id="file-input" accept=".pdf,.docx,.txt" hidden>
<div id="toast-stack"></div>

<script src="js/app.js"></script>
</body>
</html>
